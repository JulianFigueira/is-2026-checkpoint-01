version: "3.8"

services:
  frontend:
    build: ./frontend
    ports:
      - "${FRONT_PORT:-3000}:3000"
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "${BACK_PORT:-4000}:4000"
    env_file:
      - .env
    depends_on:
      - database
      

  database:
    image: postgres:16-alpine
    container_name: teamboard-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - teamboard-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  portainer:
    image: portainer/portainer-ce:latest
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - teamboard-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

networks:
  teamboard-net:

volumes:
  db_data:
  portainer_data:
